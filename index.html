<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mell | Inglês Personalizado</title>

<!-- FONTES -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  font-weight: 300;
  background: #0d0d0d;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  color: #cfcfcf;
}

/* TÍTULO */
h1 {
  font-family: 'Playfair Display', serif;
  font-weight: 600;
  letter-spacing: 0.5px;
  text-align: center;
  color: #f5c518; /* título dourado */
  font-size: 26px;
  margin-top: 10px;
  margin-bottom: 10px;
}

/* SUBTEXTO */
p {
  text-align: center;
  color: #cfcfcf;
  font-size: 14px;
  margin-bottom: 25px;
  line-height: 1.5;
}

/* PERGUNTAS MULTIPLA ESCOLHA */
label {
  display: block;
  margin-top: 15px;
  margin-bottom: 5px;
  font-weight: 500;
  color: #cfcfcf;
}

/* INPUTS E TEXTAREA */
input, textarea, select {
  width: 100%;
  padding: 14px;
  margin-top: 5px;
  border-radius: 12px;
  border: 1px solid #2a2a2a;
  background: #1c1c1c;
  color: #cfcfcf;
  font-size: 14px;
  outline: none;
  font-family: 'Poppins', sans-serif;
  font-weight: 300;
}

input::placeholder, textarea::placeholder {
  color: #888;
  font-weight: 300;
}

/* BOTÃO */
button {
  width: 100%;
  margin-top: 20px;
  padding: 15px;
  border: none;
  border-radius: 12px;
  background: linear-gradient(135deg, #f5c518, #ff9f1c);
  color: black;
  font-weight: 600;
  font-size: 15px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: translateY(-2px);
  opacity: 0.9;
}

/* SUCESSO */
.success {
  display: none;
  text-align: center;
  color: #cfcfcf;
  margin-top: 20px;
  font-size: 15px;
}

/* CONTAINER */
.container {
  background: #141414;
  padding: 40px 30px;
  border-radius: 25px;
  width: 90%;
  max-width: 420px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  border: 1px solid rgba(255, 193, 7, 0.2);
}
</style>

</head>
<body>

<div class="container">

  <h1>Vamos construir seu inglês do seu jeito ✨</h1>
  <p>
    Me conta um pouco sobre você…  
    e eu vou montar um plano totalmente personalizado pra sua realidade 💛
  </p>

  <form id="form">

    <label for="nome">Nome completo</label>
    <input name="entry.1850848797" id="nome" placeholder="Seu nome completo" required>

    <label for="whatsapp">WhatsApp</label>
    <input name="entry.787716634" id="whatsapp" placeholder="Seu WhatsApp" required>

    <label for="ocupacao">Ocupação atual</label>
    <input name="entry.1517412042" id="ocupacao" placeholder="Sua ocupação atual">

    <label for="email">Seu melhor e-mail</label>
    <input name="entry.519961555" id="email" placeholder="Seu melhor e-mail" required>

    <label for="estudo">Você já estudou inglês antes? Se sim, por quanto tempo?</label>
    <textarea name="entry.532497531" id="estudo" placeholder="Ex: 1 ano, curso online"></textarea>

    <label for="nivel">Como você considera seu nível?</label>
    <select name="entry.1004412104" id="nivel">
      <option value="">Selecione</option>
      <option>Iniciante</option>
      <option>Básico</option>
      <option>Intermediário</option>
      <option>Avançado</option>
    </select>

    <label for="objetivo">O que você quer alcançar com o inglês?</label>
    <textarea name="entry.1715182955" id="objetivo" placeholder="Ex: Conversar em viagens, trabalho"></textarea>

    <label for="recado">Quer me deixar um recado?</label>
    <textarea name="entry.485928189" id="recado" placeholder="Ex: Estou animado(a) para aprender!"></textarea>

    <button type="submit">Quero meu plano personalizado 💛</button>

  </form>

  <div class="success" id="success">
    💛 Perfeito! Recebi suas respostas. Em breve entro em contato com você.
  </div>

</div>

<script>
document.getElementById("form").addEventListener("submit", function(e) {
  e.preventDefault();

  fetch("https://docs.google.com/forms/d/e/1FAIpQLSccip6yGbnvBREs7t-_uEZu9h5Hax_GGUFfcch1lfo7z1Rjw/formResponse", {
    method: "POST",
    body: new FormData(this),
    mode: "no-cors"
  });

  document.getElementById("form").style.display = "none";
  document.getElementById("success").style.display = "block";
});
</script>

</body>
</html>
