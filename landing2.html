<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mell | Inglês Personalizado</title>

<!-- FONTES -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  font-weight: 300;
  background: #0d0d0d;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  color: #cfcfcf; /* texto cinza */
}

/* TÍTULO */
h1 {
  font-family: 'Playfair Display', serif;
  font-weight: 600;
  letter-spacing: 0.5px;
  text-align: center;
  color: #cfcfcf; /* título em cinza */
  font-size: 26px;
  margin-top: 10px;
  margin-bottom: 10px;
}

/* SUBTEXTO */
p {
  text-align: center;
  color: #cfcfcf; /* subtítulo cinza */
  font-size: 14px;
  margin-bottom: 25px;
  line-height: 1.5;
}

/* INPUTS E TEXTAREA */
input, textarea, select {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border-radius: 12px;
  border: 1px solid #2a2a2a;
  background: #1c1c1c;
  color: #cfcfcf; /* texto cinza */
  font-size: 14px;
  outline: none;
  font-family: 'Poppins', sans-serif;
  font-weight: 300;
}

input::placeholder, textarea::placeholder {
  color: #888;
  font-weight: 300;
}

/* BOTÃO */
button {
  width: 100%;
  margin-top: 20px;
  padding: 15px;
  border: none;
  border-radius: 12px;
  background: linear-gradient(135deg, #f5c518, #ff9f1c);
  color: black;
  font-weight: 600;
  font-size: 15px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: translateY(-2px);
  opacity: 0.9;
}

/* SUCESSO */
.success {
  display: none;
  text-align: center;
  color: #cfcfcf; /* sucesso cinza */
  margin-top: 20px;
  font-size: 15px;
}

/* CONTAINER */
.container {
  background: #141414;
  padding: 40px 30px;
  border-radius: 25px;
  width: 90%;
  max-width: 420px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  border: 1px solid rgba(255, 193, 7, 0.2);
}
</style>

</head>
<body>

<div class="container">

  <h1>Vamos descobrir como você quer aprender inglês ✨</h1>
  <p>
    Responda este questionário para eu criar um plano de inglês totalmente adaptado à sua rotina e necessidades 💛
  </p>

  <form id="form">
    <!-- Pergunta única combinando nome, idade e profissão -->
    <textarea name="entry.1850848797" placeholder="Nome completo, Idade, Profissão / Área de atuação" required></textarea>

    <input name="entry.276904402" placeholder="Seu melhor E-mail" required>

    <!-- Pergunta de múltipla escolha (situações que mais precisa usar inglês) -->
    <textarea name="entry.519961555" placeholder="Em quais situações você mais precisa usar o inglês?"></textarea>

    <!-- Pergunta de trabalho -->
    <textarea name="entry.1884274345" placeholder="Seu trabalho exige inglês? Se sim, quais situações?"></textarea>

    <!-- Quantas vezes por semana pretende estudar inglês -->
    <select name="entry.505854986">
      <option value="">Quantas vezes por semana você pretende estudar inglês?</option>
      <option>1 vez</option>
      <option>2 vezes</option>
      <option>3 vezes</option>
      <option>Mais de 3 vezes</option>
    </select>

    <!-- Confortável -->
    <select name="entry.564841370">
      <option value="">Você se sente confortável aprendendo inglês?</option>
      <option>Sim</option>
      <option>Não</option>
    </select>

    <!-- Começar por frases pequenas e vocabulário -->
    <select name="entry.398832724">
      <option value="">Quer começar por frases pequenas e vocabulário?</option>
      <option>Sim</option>
      <option>Não</option>
    </select>

    <!-- Viagem -->
    <select name="entry.829407416">
      <option value="">O inglês é necessário para viagem?</option>
      <option>Sim</option>
      <option>Não</option>
    </select>

    <!-- Sim estou -->
    <select name="entry.1520627930">
      <option value="">Você está motivado para aprender inglês?</option>
      <option>Sim, estou</option>
      <option>Não</option>
    </select>

    <button type="submit">Quero meu plano personalizado 💛</button>
  </form>

  <div class="success" id="success">
    💛 Perfeito! Recebi suas respostas. Em breve entro em contato com você.
  </div>

</div>

<script>
document.getElementById("form").addEventListener("submit", function(e) {
  e.preventDefault();

  fetch("https://docs.google.com/forms/d/e/1FAIpQLJUHHCbbxt5FCkLwu6/formResponse", {
    method: "POST",
    body: new FormData(this),
    mode: "no-cors"
  });

  document.getElementById("form").style.display = "none";
  document.getElementById("success").style.display = "block";
});
</script>

</body>
</html>
