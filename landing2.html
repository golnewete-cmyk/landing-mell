<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mell | Inglês Personalizado</title>

<!-- FONTES -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  font-weight: 300;
  background: #0d0d0d;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  color: #cfcfcf;
}

/* TÍTULO */
h1 {
  font-family: 'Playfair Display', serif;
  font-weight: 600;
  letter-spacing: 0.5px;
  text-align: center;
  color: #f5c518; /* título dourado */
  font-size: 26px;
  margin-top: 10px;
  margin-bottom: 10px;
}

/* SUBTEXTO */
p {
  text-align: center;
  color: #cfcfcf;
  font-size: 14px;
  margin-bottom: 25px;
  line-height: 1.5;
}

/* PERGUNTAS MULTIPLA ESCOLHA */
label {
  display: block;
  margin-top: 15px;
  margin-bottom: 5px;
  font-weight: 500;
  color: #cfcfcf;
}

/* INPUTS E TEXTAREA */
input, textarea, select {
  width: 100%;
  padding: 14px;
  margin-top: 5px;
  border-radius: 12px;
  border: 1px solid #2a2a2a;
  background: #1c1c1c;
  color: #cfcfcf;
  font-size: 14px;
  outline: none;
  font-family: 'Poppins', sans-serif;
  font-weight: 300;
}

input::placeholder, textarea::placeholder {
  color: #888;
  font-weight: 300;
}

/* BOTÃO */
button {
  width: 100%;
  margin-top: 20px;
  padding: 15px;
  border: none;
  border-radius: 12px;
  background: linear-gradient(135deg, #f5c518, #ff9f1c);
  color: black;
  font-weight: 600;
  font-size: 15px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: translateY(-2px);
  opacity: 0.9;
}

/* SUCESSO */
.success {
  display: none;
  text-align: center;
  color: #cfcfcf;
  margin-top: 20px;
  font-size: 15px;
}

/* CONTAINER */
.container {
  background: #141414;
  padding: 40px 30px;
  border-radius: 25px;
  width: 90%;
  max-width: 420px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  border: 1px solid rgba(255, 193, 7, 0.2);
}
</style>

</head>
<body>

<div class="container">

  <h1>Vamos descobrir como você quer aprender inglês ✨</h1>
  <p>
    Responda este questionário para eu criar um plano de inglês totalmente adaptado à sua rotina e necessidades 💛
  </p>

  <form id="form">
    <!-- Pergunta única combinando nome, idade e profissão -->
    <label for="nome">Nome completo, Idade, Profissão / Área de atuação</label>
    <textarea name="entry.1850848797" id="nome" placeholder="Ex: João Silva, 25, Designer" required></textarea>

    <label for="email">Seu melhor E-mail</label>
    <input name="entry.276904402" id="email" placeholder="Ex: joao@email.com" required>

    <label for="situacoes">Em quais situações você mais precisa usar o inglês?</label>
    <textarea name="entry.519961555" id="situacoes" placeholder="Ex: Trabalho, viagem, estudos"></textarea>

    <label for="trabalho">Seu trabalho exige inglês? Se sim, quais situações?</label>
    <textarea name="entry.1884274345" id="trabalho" placeholder="Ex: E-mails, reuniões, apresentações"></textarea>

    <label for="frequencia">Quantas vezes por semana você pretende estudar inglês?</label>
    <select name="entry.505854986" id="frequencia">
      <option value="">Selecione</option>
      <option>1 vez</option>
      <option>2 vezes</option>
      <option>3 vezes</option>
      <option>Mais de 3 vezes</option>
    </select>

    <label for="confortavel">Você se sente confortável aprendendo inglês?</label>
    <select name="entry.564841370" id="confortavel">
      <option value="">Selecione</option>
      <option>Sim</option>
      <option>Não</option>
    </select>

    <label for="frases">Quer começar por frases pequenas e vocabulário?</label>
    <select name="entry.398832724" id="frases">
      <option value="">Selecione</option>
      <option>Sim</option>
      <option>Não</option>
    </select>

    <label for="viagem">O inglês é necessário para viagem?</label>
    <select name="entry.829407416" id="viagem">
      <option value="">Selecione</option>
      <option>Sim</option>
      <option>Não</option>
    </select>

    <label for="motivacao">Você está motivado para aprender inglês?</label>
    <select name="entry.1520627930" id="motivacao">
      <option value="">Selecione</option>
      <option>Sim, estou</option>
      <option>Não</option>
    </select>

    <button type="submit">Quero meu plano personalizado 💛</button>
  </form>

  <div class="success" id="success">
    💛 Perfeito! Recebi suas respostas. Em breve entro em contato com você.
  </div>

</div>

<script>
document.getElementById("form").addEventListener("submit", function(e) {
  e.preventDefault();

  fetch("https://docs.google.com/forms/d/e/1FAIpQLJUHHCbbxt5FCkLwu6/formResponse", {
    method: "POST",
    body: new FormData(this),
    mode: "no-cors"
  });

  document.getElementById("form").style.display = "none";
  document.getElementById("success").style.display = "block";
});
</script>

</body>
</html>
