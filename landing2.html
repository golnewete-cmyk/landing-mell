<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mell | Inglês Personalizado</title>

<!-- FONTES -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #0d0d0d;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  color: #cfcfcf;
}
h1 {
  color: #f5c518;
  text-align: center;
  font-size: 26px;
  margin: 10px 0;
  font-weight: 600;
}
p {
  text-align: center;
  font-size: 14px;
  color: #cfcfcf;
  line-height: 1.5;
  margin-bottom: 25px;
}
label {
  display: block;
  margin-top: 15px;
  margin-bottom: 5px;
  font-weight: 500;
  color: #cfcfcf;
}
input, textarea, select {
  width: 100%;
  padding: 14px;
  margin-top: 5px;
  border-radius: 12px;
  border: 1px solid #2a2a2a;
  background: #1c1c1c;
  color: #cfcfcf;
  font-size: 14px;
  outline: none;
  font-family: 'Poppins', sans-serif;
  font-weight: 300;
}
input::placeholder, textarea::placeholder {
  color: #888;
  font-weight: 300;
}
button {
  width: 100%;
  margin-top: 20px;
  padding: 15px;
  border: none;
  border-radius: 12px;
  background: linear-gradient(135deg, #f5c518, #ff9f1c);
  color: black;
  font-weight: 600;
  font-size: 15px;
  cursor: pointer;
  font-family: 'Poppins', sans-serif;
}
button:hover {
  transform: translateY(-2px);
  opacity: 0.9;
}
.success {
  display: none;
  text-align: center;
  color: #cfcfcf;
  margin-top: 20px;
  font-size: 15px;
  font-family: 'Poppins', sans-serif;
}
.container {
  background: #141414;
  padding: 40px 30px;
  border-radius: 25px;
  width: 90%;
  max-width: 480px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  border: 1px solid rgba(255, 193, 7, 0.2);
}
</style>

</head>
<body>

<div class="container">

  <h1>Vamos descobrir como você quer aprender inglês ✨</h1>
  <p>
    Responda este questionário para eu criar um plano totalmente adaptado à sua rotina e necessidades 💛
  </p>

  <form id="form">

    <label>Nome completo:<br>Idade:<br>Profissão / Área de atuação:</label>
    <textarea name="entry.1850848797" placeholder="Ex: João Silva, 25, Designer" required></textarea>

    <label>Seu melhor E-mail</label>
    <input name="entry.276904402" type="email" placeholder="Ex: joao@email.com" required>

    <label>Em quais situações você mais precisa usar o inglês?</label>
    <textarea name="entry.519961555" placeholder="Ex: Trabalho, viagem, estudos"></textarea>

    <label>Como você se sentiria se o foco fosse conversação, com aulas preparadas de acordo com seu OBJETIVO?</label>
    <select name="entry.564841370">
      <option value="">Selecione</option>
      <option>Confortável</option>
      <option>Não me sentiria bem ainda</option>
    </select>

    <label>Se sua resposta anterior foi: Não me sentiria confortável em já começar pela conversação, qual habilidade gostaria de começar?</label>
    <select name="entry.398832724">
      <option value="">Selecione</option>
      <option>Começar por frases pequenas e vocabulário</option>
      <option>Vocabulário profissional</option>
      <option>Compreensão auditiva</option>
      <option>Outro</option>
    </select>

    <label>Seu trabalho exige inglês? Se sim, quais situação?</label>
    <textarea name="entry.1884274345" placeholder="Ex: E-mails, reuniões, apresentações"></textarea>

    <label>Quantas vezes por semana você pretende estudar inglês?</label>
    <input name="entry.505854986" placeholder="Ex: 3 vezes" type="text">

    <label>Você tem algum objetivo com prazo definido? Exemplo:</label>
    <select name="entry.829407416">
      <option value="">Selecione</option>
      <option>Viagem</option>
      <option>Trabalho</option>
      <option>Entrevista de emprego</option>
      <option>Mudança de país</option>
      <option>Outro</option>
    </select>

    <label>Com base nas suas respostas, eu vou desenvolver um plano de aulas personalizado, com materiais e atividades focados exatamente no seu objetivo. O prazo para preparação do material é de até 7 dias, para garantir que tudo seja feito com qualidade e direcionado às suas necessidades, Você está de acordo?</label>
    <select name="entry.1520627930">
      <option value="">Selecione</option>
      <option>Sim, estou</option>
      <option>Não, muito obrigada, thank you next!</option>
    </select>

    <button type="submit">Quero meu plano personalizado 💛</button>
  </form>

  <div class="success" id="success">
    💛 Perfeito! Recebi suas respostas. Em breve entro em contato com você.
  </div>

</div>

<script>
document.getElementById("form").addEventListener("submit", function(e){
  e.preventDefault();
  fetch("https://docs.google.com/forms/d/e/1FAIpQLScjidkwcU778XFBG2EK8ZrjMbVpIdxzLJGDoQgXWRIKzXB4GA/formResponse", {
    method: "POST",
    body: new FormData(this),
    mode: "no-cors"
  });
  document.getElementById("form").style.display = "none";
  document.getElementById("success").style.display = "block";
});
</script>

</body>
</html>
